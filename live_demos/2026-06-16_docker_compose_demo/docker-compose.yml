services:
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      GREETING: "Hello from Compose"
      APP_ENV: "compose"
      INPUT_DIR: "/mnt/input"
      OUTPUT_DIR: "/mnt/output"
      # "db" resolves to the postgres container — Compose handles the DNS
      DATABASE_URL: "postgresql://demo:demo@db:5432/demo"
    volumes:
      - ./input:/mnt/input:ro    # read-only — container cannot modify source data
      - ./output:/mnt/output     # read-write — container writes results here

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    volumes:
      # Mount at the parent dir — pg18+ manages the versioned subdir itself
      - pg-data:/var/lib/postgresql

volumes:
  pg-data:
